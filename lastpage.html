<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<script>

window.onload = () => {

confetti({
    particleCount:250,
    spread:180,
    startVelocity:45,
    origin:{ y:0.6 }
});

const end = Date.now() + 5000;

(function frame(){

    confetti({
        particleCount:3,
        angle:60,
        spread:60,
        origin:{x:0}
    });

    confetti({
        particleCount:3,
        angle:120,
        spread:60,
        origin:{x:1}
    });

    if(Date.now() < end){

        requestAnimationFrame(frame);

    }

})();

}

</script>
